name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Smoke test
        run: ./scripts/smoke_test.sh
      - name: Privacy/publication scan
        run: |
          python - <<'PY'
          from pathlib import Path
          # Build sensitive markers by concatenation so the workflow file itself
          # does not contain the exact strings being searched for.
          needles = [
              '14' + ':ab',
              '14' + ':AB',
              'tail' + 'ad',
              '/mnt/' + 'slane',
              'Мои ' + 'приложения',
              'Сл' + 'ейн',
              'SL' + 'ANE',
              'slane' + '-stick',
              'yu' + 'rii',
              'yu' + 'rii86',
              'gh' + 'p_',
          ]
          hits=[]
          for p in Path('.').rglob('*'):
              if not p.is_file() or '.git' in p.parts or '__pycache__' in p.parts or '.ai_context' in p.parts:
                  continue
              text=p.read_text(errors='ignore')
              for n in needles:
                  if n in text:
                      hits.append((str(p), n))
          if hits:
              print('bad hits', hits[:50])
              raise SystemExit(1)
          print('privacy scan ok')
          PY
