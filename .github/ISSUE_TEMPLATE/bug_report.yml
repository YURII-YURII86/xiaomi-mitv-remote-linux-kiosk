name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands or actions.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
      description: Remove tokens, real MAC addresses, private hostnames, and private paths.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / environment
      placeholder: Debian 12, Ubuntu 24.04, Raspberry Pi OS, etc.
  - type: dropdown
    id: production
    attributes:
      label: Is this a production kiosk/device?
      options:
        - "No"
        - "Yes, production-critical"
        - "Not sure"
    validations:
      required: true
